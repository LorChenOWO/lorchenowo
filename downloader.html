<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>下载 - Foctax</title>
    <link rel="preconnect" href="https://fonts.proxy.ustclug.org">
    <link href="https://fonts.proxy.ustclug.org/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .download-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 25px 45px -12px rgba(52, 114, 142, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }
        .header { text-align: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px dashed #cce3ef; }
        .header-icon { font-size: 3rem; color: #7bbbd9; margin-bottom: 0.5rem; animation: fadeInDown 0.5s cubic-bezier(0.34, 1.2, 0.64, 1) forwards; }
        .header h1 { font-size: 1.8rem; font-weight: 600; background: linear-gradient(135deg, #1f5e7e, #3282a0); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .subtitle { font-size: 0.85rem; color: #608da5; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; padding: 0.8rem 1rem; background: rgba(200, 220, 240, 0.3); border-radius: 1rem; }
        .search-box { display: flex; gap: 0.5rem; flex: 1; max-width: 300px; }
        .search-input { flex: 1; padding: 0.5rem 1rem; background: rgba(255, 255, 255, 0.7); border: 1px solid #cce3ef; border-radius: 40px; font-size: 0.8rem; outline: none; }
        .search-input:focus { border-color: #4f8cff; box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.2); background: white; }
        .refresh-btn { background: rgba(79, 140, 255, 0.15); border: 1px solid #4f8cff; padding: 0.4rem 1rem; border-radius: 40px; font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .refresh-btn:hover { background: rgba(79, 140, 255, 0.3); transform: translateY(-1px); }
        .stats { display: flex; gap: 1rem; margin-bottom: 1rem; padding: 0.5rem 1rem; background: rgba(200, 220, 240, 0.2); border-radius: 1rem; font-size: 0.75rem; color: #608da5; flex-wrap: wrap; }
        .file-list { max-height: 500px; overflow-y: auto; border-radius: 1rem; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.2rem; background: rgba(255, 255, 255, 0.6); border-radius: 1rem; margin-bottom: 0.6rem; transition: all 0.2s ease; cursor: pointer; }
        .file-item:hover { background: rgba(184, 225, 252, 0.6); transform: translateX(5px); }
        .file-info { flex: 1; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .file-icon { font-size: 1.5rem; color: #2c7da0; width: 40px; text-align: center; }
        .file-details { flex: 1; }
        .file-name { font-weight: 600; color: #165a77; font-size: 0.95rem; word-break: break-all; }
        .file-size { font-size: 0.7rem; color: #608da5; }
        .download-btn { background: #4f8cff; border: none; padding: 0.4rem 1rem; border-radius: 40px; font-size: 0.75rem; font-weight: 500; color: white; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .download-btn:hover { background: #2566d8; transform: translateY(-2px); }
        .loading-overlay { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 3rem; color: #2c7da0; }
        .loading-spinner { width: 24px; height: 24px; border: 3px solid #cce3ef; border-top-color: #4f8cff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .empty-state { text-align: center; padding: 3rem; color: #90aec2; }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
        .config-panel { background: rgba(79, 140, 255, 0.1); border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; }
        .config-row { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.5rem; }
        .config-label { font-size: 0.75rem; color: #165a77; font-weight: 600; }
        .config-input { flex: 1; min-width: 200px; padding: 0.4rem 0.8rem; background: rgba(255, 255, 255, 0.7); border: 1px solid #cce3ef; border-radius: 40px; font-size: 0.8rem; }
        .fox-tip { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px dashed #cce3ef; font-size: 0.7rem; color: #7ba5c0; }
        @media (max-width: 768px) { .toolbar { flex-direction: column; align-items: stretch; } .search-box { max-width: none; } .file-item { flex-direction: column; align-items: flex-start; gap: 0.8rem; } .file-info { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>
<div class="container">
    <div class="download-card">
        <div class="header"><div class="header-icon"><i class="fas fa-cloud-download-alt"></i></div><h1>Foctax文件站</h1><div class="subtitle">来下载文件吧nwn | 文件保存在GitHub仓库上zwz</div></div>
        <div class="config-panel">
            <div class="config-row"><span class="config-label"><i class="fab fa-github"></i> GitHub 用户名：</span><input type="text" id="ownerInput" class="config-input" placeholder="例如: LorChenOWO" value="LorChenOWO"></div>
            <div class="config-row"><span class="config-label"><i class="fas fa-database"></i> 仓库名：</span><input type="text" id="repoInput" class="config-input" placeholder="例如: my-files" value="LorChenOWO"><span style="font-size:0.7rem;">.github.io</span></div>
            <div class="config-row"><span class="config-label"><i class="fas fa-folder"></i> 文件目录：</span><input type="text" id="pathInput" class="config-input" placeholder="例如: files" value="files"><button class="refresh-btn" id="applyConfigBtn"><i class="fas fa-check"></i> 应用并加载</button></div>
        </div>
        <div class="toolbar"><div class="search-box"><i class="fas fa-search" style="color:#90aec2;"></i><input type="text" id="searchInput" class="search-input" placeholder="搜索文件..." onkeyup="filterFiles()"></div><button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> 刷新列表</button></div>
        <div class="stats" id="stats"><span><i class="fas fa-database"></i> 等待加载...</span></div>
        <div class="file-list" id="fileList"><div class="loading-overlay"><i class="fas fa-folder-open" style="font-size:2rem;"></i><span>请在上方填写 GitHub 信息后点击"应用并加载"</span></div></div>
        <div class="fox-tip"><i class="fas fa-fox"></i> 小福泥提示：填写正确的 GitHub 用户名和仓库名后点击加载，文件会显示在下方的列表里~</div>
    </div>
</div>
<script>
    let fileListData = [], searchKeyword = '';
    function formatFileSize(bytes) { if (!bytes) return '未知大小'; const sizes = ['B','KB','MB','GB']; const i = Math.floor(Math.log(bytes)/Math.log(1024)); return parseFloat((bytes/Math.pow(1024,i)).toFixed(2)) + ' ' + sizes[i]; }
    function getFileIcon(filename) { const ext = filename.split('.').pop().toLowerCase(); const icons = {jpg:'fa-file-image',png:'fa-file-image',mp4:'fa-file-video',mp3:'fa-file-audio',pdf:'fa-file-pdf',zip:'fa-file-archive',txt:'fa-file-alt',js:'fa-code',py:'fa-python',html:'fa-code'}; return icons[ext] || 'fa-file'; }
    function getRawUrl(owner, repo, path, filename) { return `https://raw.githubusercontent.com/${owner}/${repo}/main/${path}/${filename}`; }
    async function downloadFile(item, owner, repo, path, event) { if(event) event.stopPropagation(); window.open(getRawUrl(owner, repo, path, item.name), '_blank'); showToast(`开始下载: ${item.name}`); }
    function renderFileList(owner, repo, path) {
        const fileListDiv = document.getElementById('fileList'), statsDiv = document.getElementById('stats');
        let filteredFiles = fileListData.filter(f => !searchKeyword || f.name.toLowerCase().includes(searchKeyword.toLowerCase()));
        if(filteredFiles.length===0){ fileListDiv.innerHTML=`<div class="empty-state"><i class="fas fa-folder-open"></i><p>${fileListData.length===0?'没有找到任何文件~':'没有找到匹配的文件~'}</p></div>`; statsDiv.innerHTML=`<span>共 0 个文件</span><span>${owner}/${repo}/${path}</span>`; return; }
        filteredFiles.sort((a,b)=>a.name.localeCompare(b.name));
        fileListDiv.innerHTML = filteredFiles.map(file => `<div class="file-item" onclick="downloadFile(${JSON.stringify(file).replace(/"/g,'&quot;')},'${owner}','${repo}','${path}',event)"><div class="file-info"><div class="file-icon"><i class="fas ${getFileIcon(file.name)}"></i></div><div class="file-details"><div class="file-name">${escapeHtml(file.name)}</div></div></div><div class="file-size">${formatFileSize(file.size)}</div><button class="download-btn" onclick="event.stopPropagation();downloadFile(${JSON.stringify(file).replace(/"/g,'&quot;')},'${owner}','${repo}','${path}',event)"><i class="fas fa-download"></i> 下载</button></div>`).join('');
        statsDiv.innerHTML = `<span>共 ${filteredFiles.length} 个文件</span><span>${owner}/${repo}/${path}</span>${searchKeyword?`<span>筛选: ${searchKeyword}</span>`:''}`;
    }
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    async function fetchFileListViaGitHubAPI(owner, repo, path) {
        try { const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`); if(response.ok){ const data = await response.json(); if(Array.isArray(data)) return data.filter(item=>item.type==='file').map(item=>({name:item.name,size:item.size||0})); } } catch(e){} return null;
    }
    async function loadFiles(){
        let owner = document.getElementById('ownerInput').value.trim(), repo = document.getElementById('repoInput').value.trim(), path = document.getElementById('pathInput').value.trim();
        if(!owner||!repo){ showToast('请填写 GitHub 用户名和仓库名',true); return; }
        if(repo.endsWith('.github.io')) repo = repo.replace('.github.io','');
        const fileListDiv = document.getElementById('fileList');
        fileListDiv.innerHTML = `<div class="loading-overlay"><div class="loading-spinner"></div><span>正在获取文件列表...</span></div>`;
        let files = await fetchFileListViaGitHubAPI(owner, repo, path);
        if(files && files.length>0){ fileListData = files; renderFileList(owner, repo, path); showToast(`成功加载 ${files.length} 个文件~`); }
        else { fileListDiv.innerHTML=`<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>无法获取文件列表</p><p style="font-size:0.7rem;">请确保仓库中存在 ${path} 文件夹</p></div>`; statsDiv.innerHTML=`<span>加载失败</span>`; }
    }
    function filterFiles(){ searchKeyword = document.getElementById('searchInput').value; const owner = document.getElementById('ownerInput').value.trim(), repo = document.getElementById('repoInput').value.trim().replace('.github.io',''), path = document.getElementById('pathInput').value.trim(); renderFileList(owner, repo, path); }
    function showToast(msg,isErr=false){ const toast=document.createElement('div'); toast.innerHTML=`<i class="fas ${isErr?'fa-exclamation-triangle':'fa-heart'}"></i> ${msg}`; toast.style.cssText=`position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:${isErr?'#ffe6e6':'#e6f4fa'};border:1px solid ${isErr?'#ffaaaa':'#b8d6e8'};color:${isErr?'#cc3333':'#2c7da0'};padding:10px 20px;border-radius:40px;font-size:0.85rem;z-index:10000;white-space:nowrap;`; document.body.appendChild(toast); setTimeout(()=>{toast.style.opacity='0'; setTimeout(()=>toast.remove(),300);},2500); }
    document.getElementById('refreshBtn').addEventListener('click',loadFiles); document.getElementById('applyConfigBtn').addEventListener('click',loadFiles); window.downloadFile = downloadFile; window.filterFiles = filterFiles;
    const urlParams = new URLSearchParams(window.location.search); if(urlParams.has('owner')) document.getElementById('ownerInput').value = urlParams.get('owner'); if(urlParams.has('repo')) document.getElementById('repoInput').value = urlParams.get('repo'); if(urlParams.has('path')) document.getElementById('pathInput').value = urlParams.get('path');
</script>
</body>
</html>
