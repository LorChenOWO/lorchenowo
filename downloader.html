<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>下载 - Foctax</title>
    <link rel="preconnect" href="https://fonts.proxy.ustclug.org">
    <link rel="preconnect" href="https://fonts.proxy.ustclug.org" crossorigin>
    <link href="https://fonts.proxy.ustclug.org/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.staticfile.net/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Consolas', '圆体', 'Yuanti SC', 'YouYuan', 'Microsoft YaHei', monospace;
            background: linear-gradient(145deg, #f0f9ff 0%, #e6f4fa 100%);
            color: #1a2c3e;
            min-height: 100vh;
            padding: 1.5rem;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .download-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 25px 45px -12px rgba(52, 114, 142, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        .download-card:hover {
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 30px 50px -15px rgba(52, 114, 142, 0.3);
            border-color: #cae3ef;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px dashed #cce3ef;
        }

        .header-icon {
            font-size: 3rem;
            color: #7bbbd9;
            margin-bottom: 0.5rem;
            animation: fadeInDown 0.5s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1f5e7e, #3282a0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #608da5;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 0.8rem 1rem;
            background: rgba(200, 220, 240, 0.3);
            border-radius: 1rem;
        }

        .search-box {
            display: flex;
            gap: 0.5rem;
            flex: 1;
            max-width: 300px;
        }

        .search-input {
            flex: 1;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #cce3ef;
            border-radius: 40px;
            font-size: 0.8rem;
            font-family: 'Consolas', '圆体', monospace;
            outline: none;
        }

        .search-input:focus {
            border-color: #4f8cff;
            box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.2);
            background: white;
        }

        .refresh-btn {
            background: rgba(79, 140, 255, 0.15);
            border: 1px solid #4f8cff;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Consolas', '圆体', monospace;
        }

        .refresh-btn:hover {
            background: rgba(79, 140, 255, 0.3);
            transform: translateY(-1px);
        }

        .stats {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(200, 220, 240, 0.2);
            border-radius: 1rem;
            font-size: 0.75rem;
            color: #608da5;
            flex-wrap: wrap;
        }

        .file-list {
            max-height: 500px;
            overflow-y: auto;
            border-radius: 1rem;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.2rem;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 1rem;
            margin-bottom: 0.6rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .file-item:hover {
            background: rgba(184, 225, 252, 0.6);
            transform: translateX(5px);
        }

        .file-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .file-icon {
            font-size: 1.5rem;
            color: #2c7da0;
            width: 40px;
            text-align: center;
        }

        .file-details {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            color: #165a77;
            font-size: 0.95rem;
            word-break: break-all;
        }

        .file-size {
            font-size: 0.7rem;
            color: #608da5;
            margin-right: 1rem;
        }

        .download-btn {
            background: #4f8cff;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Consolas', '圆体', monospace;
        }

        .download-btn:hover {
            background: #2566d8;
            transform: translateY(-2px);
        }

        .loading-overlay {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 3rem;
            color: #2c7da0;
        }

        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #cce3ef;
            border-top-color: #4f8cff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #90aec2;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .config-panel {
            background: rgba(79, 140, 255, 0.1);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .config-row {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }

        .config-label {
            font-size: 0.75rem;
            color: #165a77;
            font-weight: 600;
        }

        .config-input {
            flex: 1;
            min-width: 200px;
            padding: 0.4rem 0.8rem;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #cce3ef;
            border-radius: 40px;
            font-size: 0.8rem;
            font-family: 'Consolas', '圆体', monospace;
        }

        .fox-tip {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px dashed #cce3ef;
            font-size: 0.7rem;
            color: #7ba5c0;
        }

        @media (max-width: 768px) {
            body {
                padding: 0.8rem;
            }
            .download-card {
                padding: 1rem;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                max-width: none;
            }
            .file-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.3rem;
            }
            .file-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="download-card">
        <div class="header">
            <div class="header-icon">
                <i class="fas fa-cloud-download-alt"></i>
            </div>
            <h1>Foctax文件站</h1>
            <div class="subtitle">来下载文件吧nwn | 文件保存在GitHub仓库上zwz</div>
        </div>

        <div class="config-panel">
            <div class="config-row">
                <span class="config-label"><i class="fab fa-github"></i> GitHub 用户名：</span>
                <input type="text" id="ownerInput" class="config-input" placeholder="例如: LorChenOWO" value="LorChenOWO">
            </div>
            <div class="config-row">
                <span class="config-label"><i class="fas fa-database"></i> 仓库名：</span>
                <input type="text" id="repoInput" class="config-input" placeholder="例如: my-files" value="LorChenOWO">
                <span style="font-size:0.7rem; color:#90aec2;">.github.io</span>
            </div>
            <div class="config-row">
                <span class="config-label"><i class="fas fa-folder"></i> 文件目录：</span>
                <input type="text" id="pathInput" class="config-input" placeholder="例如: files" value="files">
                <button class="refresh-btn" id="applyConfigBtn">
                    <i class="fas fa-check"></i> 应用并加载
                </button>
            </div>
        </div>

        <div class="toolbar">
            <div class="search-box">
                <i class="fas fa-search" style="color: #90aec2; align-self: center;"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="搜索文件..." onkeyup="filterFiles()">
            </div>
            <button class="refresh-btn" id="refreshBtn">
                <i class="fas fa-sync-alt"></i> 刷新列表
            </button>
        </div>

        <div class="stats" id="stats">
            <span><i class="fas fa-database"></i> 等待加载...</span>
        </div>

        <div class="file-list" id="fileList">
            <div class="loading-overlay">
                <i class="fas fa-folder-open" style="font-size: 2rem; opacity: 0.5;"></i>
                <span>请在上方填写 GitHub 信息后点击"应用并加载"</span>
            </div>
        </div>

        <div class="fox-tip">
            <i class="fas fa-fox"></i> 小福泥提示：填写正确的 GitHub 用户名和仓库名后点击加载，文件会显示在下方的列表里~
        </div>
    </div>
</div>

<script>
    let fileListData = [];
    let searchKeyword = '';

    function formatFileSize(bytes) {
        if (bytes === undefined || bytes === null) return '未知大小';
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function getFileIcon(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        const icons = {
            'jpg': 'fa-file-image', 'jpeg': 'fa-file-image', 'png': 'fa-file-image', 'gif': 'fa-file-image', 'bmp': 'fa-file-image', 'webp': 'fa-file-image',
            'mp4': 'fa-file-video', 'avi': 'fa-file-video', 'mov': 'fa-file-video', 'mkv': 'fa-file-video',
            'mp3': 'fa-file-audio', 'wav': 'fa-file-audio', 'flac': 'fa-file-audio',
            'pdf': 'fa-file-pdf',
            'doc': 'fa-file-word', 'docx': 'fa-file-word',
            'xls': 'fa-file-excel', 'xlsx': 'fa-file-excel',
            'ppt': 'fa-file-powerpoint', 'pptx': 'fa-file-powerpoint',
            'zip': 'fa-file-archive', 'rar': 'fa-file-archive', '7z': 'fa-file-archive', 'tar': 'fa-file-archive', 'gz': 'fa-file-archive',
            'txt': 'fa-file-alt', 'md': 'fa-file-alt',
            'html': 'fa-code', 'css': 'fa-code', 'js': 'fa-code', 'json': 'fa-code',
            'exe': 'fa-windows', 'msi': 'fa-windows',
            'apk': 'fa-android',
            'dmg': 'fa-apple',
            'py': 'fa-python',
            'java': 'fa-java',
            'c': 'fa-code', 'cpp': 'fa-code', 'h': 'fa-code'
        };
        return icons[ext] || 'fa-file';
    }

    function getRawUrl(owner, repo, path, filename) {
        return `https://raw.githubusercontent.com/${owner}/${repo}/main/${path}/${filename}`;
    }

    async function downloadFile(item, owner, repo, path, event) {
        if (event) event.stopPropagation();
        const rawUrl = getRawUrl(owner, repo, path, item.name);
        showToast(`正在下载: ${item.name}`, false);
        try {
            const link = document.createElement('a');
            link.href = rawUrl;
            link.download = item.name;
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast(`开始下载: ${item.name}`, false);
        } catch (e) {
            showToast(`下载失败: ${e.message}`, true);
        }
    }

    function renderFileList(owner, repo, path) {
        const fileListDiv = document.getElementById('fileList');
        const statsDiv = document.getElementById('stats');
        
        let filteredFiles = fileListData;
        if (searchKeyword) {
            filteredFiles = fileListData.filter(file => 
                file.name.toLowerCase().includes(searchKeyword.toLowerCase())
            );
        }
        
        if (filteredFiles.length === 0) {
            fileListDiv.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-folder-open"></i>
                    <p>${fileListData.length === 0 ? '没有找到任何文件~' : '没有找到匹配的文件~'}</p>
                    <p style="font-size:0.7rem; margin-top:0.5rem;">请确保仓库中存在 ${path} 文件夹</p>
                </div>
            `;
            statsDiv.innerHTML = `
                <span><i class="fas fa-database"></i> 共 0 个文件</span>
                <span><i class="fas fa-folder"></i> ${owner}/${repo}/${path}</span>
            `;
            return;
        }
        
        filteredFiles.sort((a, b) => a.name.localeCompare(b.name));
        
        fileListDiv.innerHTML = filteredFiles.map(file => `
            <div class="file-item" onclick="downloadFile(${JSON.stringify(file).replace(/"/g, '&quot;')}, '${owner}', '${repo}', '${path}', event)">
                <div class="file-info">
                    <div class="file-icon">
                        <i class="fas ${getFileIcon(file.name)}"></i>
                    </div>
                    <div class="file-details">
                        <div class="file-name">${escapeHtml(file.name)}</div>
                    </div>
                </div>
                <div class="file-size">
                    <i class="fas fa-hdd"></i> ${formatFileSize(file.size)}
                </div>
                <button class="download-btn" onclick="event.stopPropagation(); downloadFile(${JSON.stringify(file).replace(/"/g, '&quot;')}, '${owner}', '${repo}', '${path}', event)">
                    <i class="fas fa-download"></i> 下载
                </button>
            </div>
        `).join('');
        
        statsDiv.innerHTML = `
            <span><i class="fas fa-database"></i> 共 ${filteredFiles.length} 个文件</span>
            <span><i class="fas fa-folder"></i> ${owner}/${repo}/${path}</span>
            ${searchKeyword ? `<span><i class="fas fa-search"></i> 筛选: ${searchKeyword}</span>` : ''}
        `;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function fetchFileListViaFileList(owner, repo, path) {
        const filelistUrl = `https://raw.githubusercontent.com/${owner}/${repo}/main/${path}/filelist.json`;
        try {
            const response = await fetch(filelistUrl);
            if (response.ok) {
                const data = await response.json();
                if (Array.isArray(data)) {
                    return data;
                }
            }
        } catch (e) {
            console.log('filelist.json 不存在');
        }
        return null;
    }

    async function fetchFileListViaJsDelivr(owner, repo, path) {
        try {
            const apiUrl = `https://api.jsdelivr.com/v1/jsdelivr/gh/${owner}/${repo}/`;
            const response = await fetch(apiUrl);
            if (response.ok) {
                const data = await response.json();
                if (data && data.default && data.default.files) {
                    const prefix = `${path}/`;
                    const files = data.default.files
                        .filter(file => file.name.startsWith(prefix) && !file.name.endsWith('/'))
                        .map(file => ({
                            name: file.name.replace(prefix, ''),
                            size: file.size || 0,
                            sha: file.hash || ''
                        }));
                    if (files.length > 0) {
                        return files;
                    }
                }
            }
        } catch (e) {
            console.log('jsDelivr API 失败:', e);
        }
        return null;
    }

    async function fetchFileListViaGitHubAPI(owner, repo, path) {
        const apis = [
            `https://api.github.com/repos/${owner}/${repo}/contents/${path}`,
            `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`)}`
        ];
        
        for (const api of apis) {
            try {
                const response = await fetch(api, {
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    const data = await response.json();
                    if (Array.isArray(data)) {
                        return data.filter(item => item.type === 'file').map(item => ({
                            name: item.name,
                            size: item.size || 0,
                            sha: item.sha || ''
                        }));
                    }
                }
            } catch (e) {
                console.log('API 尝试失败:', api);
            }
        }
        return null;
    }

    async function loadFiles() {
        const owner = document.getElementById('ownerInput').value.trim();
        let repo = document.getElementById('repoInput').value.trim();
        const path = document.getElementById('pathInput').value.trim();
        
        if (!owner || !repo) {
            showToast('请填写 GitHub 用户名和仓库名', true);
            return;
        }
        
        if (repo.endsWith('.github.io')) {
            repo = repo.replace('.github.io', '');
        }
        
        const fileListDiv = document.getElementById('fileList');
        const statsDiv = document.getElementById('stats');
        
        fileListDiv.innerHTML = `
            <div class="loading-overlay">
                <div class="loading-spinner"></div>
                <span>正在获取文件列表...</span>
            </div>
        `;
        
        showToast(`正在加载 ${owner}/${repo}/${path}...`, false);
        
        let files = null;
        
        files = await fetchFileListViaFileList(owner, repo, path);
        
        if (!files) {
            files = await fetchFileListViaJsDelivr(owner, repo, path);
        }
        
        if (!files) {
            files = await fetchFileListViaGitHubAPI(owner, repo, path);
        }
        
        if (files && files.length > 0) {
            fileListData = files;
            renderFileList(owner, repo, path);
            showToast(`成功加载 ${files.length} 个文件~`, false);
        } else {
            fileListDiv.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>无法获取文件列表</p>
                    <p style="font-size:0.7rem; margin-top:0.5rem;">
                        可能的原因：
                        <br>1. 仓库名或用户名不正确
                        <br>2. ${path} 文件夹不存在
                        <br>3. 文件夹为空
                    </p>
                    <p style="font-size:0.7rem; margin-top:0.8rem; color:#4f8cff;">
                        💡 建议：在 ${path} 文件夹中创建 filelist.json 文件
                    </p>
                </div>
            `;
            statsDiv.innerHTML = `<span><i class="fas fa-exclamation-circle"></i> 加载失败，请检查配置或创建 filelist.json</span>`;
        }
    }

    function filterFiles() {
        searchKeyword = document.getElementById('searchInput').value;
        const owner = document.getElementById('ownerInput').value.trim();
        let repo = document.getElementById('repoInput').value.trim();
        const path = document.getElementById('pathInput').value.trim();
        if (repo.endsWith('.github.io')) repo = repo.replace('.github.io', '');
        renderFileList(owner, repo, path);
    }

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-heart'}"></i> ${message}`;
        toast.style.cssText = `
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: ${isError ? '#ffe6e6' : '#e6f4fa'};
            border: 1px solid ${isError ? '#ffaaaa' : '#b8d6e8'};
            color: ${isError ? '#cc3333' : '#2c7da0'};
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 10000;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-family: 'Consolas', '圆体', monospace;
            white-space: nowrap;
        `;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 2500);
    }

    function bindEvents() {
        document.getElementById('refreshBtn').addEventListener('click', loadFiles);
        document.getElementById('applyConfigBtn').addEventListener('click', loadFiles);
        window.downloadFile = downloadFile;
        window.filterFiles = filterFiles;
    }

    function autoLoad() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('owner')) document.getElementById('ownerInput').value = urlParams.get('owner');
        if (urlParams.has('repo')) document.getElementById('repoInput').value = urlParams.get('repo');
        if (urlParams.has('path')) document.getElementById('pathInput').value = urlParams.get('path');
        
        bindEvents();
        
        const owner = document.getElementById('ownerInput').value;
        const repo = document.getElementById('repoInput').value;
        if (owner && repo && owner !== 'LorChenOWO') {
            loadFiles();
        }
    }

    autoLoad();
</script>
</body>
</html>
